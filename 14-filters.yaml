- name: remove duplicate numbers
  hosts: localhost
  vars:
    numbers: [1,2,2,2,3,4,5]
  tasks:
  - name: remove duplicates
    ansible.builtin.debug:
      msg: "{{numbers | unique }}"
  
- name: min and max age
  hosts: localhost
  vars:
    ages: [ 23 65 12 67 54 87 100]
  tasks:
  - name: find the min ages
    ansible.builtin.debug:
      msg: "min ages are :{{ages | min}} and max ages are :{{ages | max}}"  
