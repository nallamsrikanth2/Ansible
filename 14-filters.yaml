- name: default value
  hosts: localhost
  tasks:
  - name: print the information
    ansible.builtin.debug:
      msg: "location is {{location | default ('banglore')}}"

- name: uppercase
  hosts: localhost
  vars:
    wishes: "good morning namma bengaluru"
  tasks:
  - name: print the information
    ansible.builtin.debug:
      msg: "{{wishes | upper }}"

- name: lowercase
  hosts: localhost
  vars:
    wishes: "HAPPY BIRTHDAY TO ME"
  tasks:
  - name: print the information
    ansible.builtin.debug:
      msg: "{{wishes | lower }}"

- name: remove duplicate numbers
  hosts: localhost
  vars:
    numbers: [1,2,2,2,3,4,5]
  tasks:
  - name: remove duplicates
    ansible.builtin.debug:
      msg: "{{numbers | unique }}"
  
- name: min and max age
  hosts: localhost
  vars:
    ages: [ 23, 65, 12, 67, 54, 87, 100]
  tasks:
  - name: find the min ages
    ansible.builtin.debug:
      msg: "min ages are :{{ages | min}} and max ages are :{{ages | max}}"  


- name: change dict2items
  hosts: localhost
  vars:
    dict:
      course: aws
      trainer: siva
      duration: 120
  tasks:
  - name: before convert
    ansible.builtin.debug:
      msg: "{{dict}}"

  - name: change the dict2items
    ansible.builtin.debug:
      msg: "{{dict | dict2items }}"

- name: items2dict
  hosts: localhost
  vars:
    lists:
    - {  "key": "course", "value": "aws" }
    - { "key": "trainer", "value": "siva" }
  tasks:
  - name: before convert
    ansible.builtin.debug:
      msg: "{{lists}}"

  - name: change the items2dict
    ansible.builtin.debug:
      msg: "{{lists | ltems2dict}}"


