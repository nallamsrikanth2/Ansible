- name: default value
  hosts: localhost
  tasks:
  - name: print the information
    ansible.builtin.debug:
      msg: "location is {{location | default ('banglore')}}"

- name: uppercase
  hosts: localhost
  vars:
    wishes: "good morning namma bengaluru"
  tasks:
  - name: print the information
    ansible.builtin.debug:
      msg: "{{wishes | upper }}"

- name: lowercase
  hosts: localhost
  vars:
    wishes: "HAPPY BIRTHDAY TO ME"
  tasks:
  - name: print the information
    ansible.builtin.debug:
      msg: "{{wishes | lower }}"

