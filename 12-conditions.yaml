- name: conditions
  hosts: localhost
  become: yes
  tasks:
  - name: check user is there or not
    ansible.builtin.command: id expense
    register: user
    ignore_errors: true
    
  - name: print the information
    ansible.builtin.debug:
      msg: "user info {{user}}"

  - name: crete a user 
    ansible.builtin.command: useradd expense
    when: user.rc != 0 #condition

    